# 服务器配置
server:
  port: 8080
  mode: debug  # debug, release, test

# 数据库配置
database:
  host: localhost
  port: 3306
  username: root
  password: 123456
  dbname: videofeed
  max_idle_conns: 10
  max_open_conns: 100

# Redis配置
redis:
  host: localhost
  port: 6379
  password: 123456
  db: 0

# JWT配置
jwt:
  secret: yangyue
  expire_time: 72  # 过期时间(小时)

# 上传配置
upload:
  max_size: 100  # MB
  video_path: ./static/videos
  cover_path: ./static/covers
  allow_types:
    - mp4
    - avi
    - mov

# 阿里云OSS配置 (优先从环境变量读取)
oss:
  endpoint: "oss-cn-beijing.aliyuncs.com"           # 环境变量: OSS_ENDPOINT
  access_key_id: ""      # 环境变量: OSS_ACCESS_KEY_ID
  access_key_secret: ""  # 环境变量: OSS_ACCESS_KEY_SECRET
  bucket_name: "tvyy"        # 环境变量: OSS_BUCKET_NAME
  domain: "tvyy.oss-cn-beijing.aliyuncs.com"             # 环境变量: OSS_DOMAIN

# 日志配置
log:
  filename: "video_log"
  max_size: 200    # MB
  max_backups: 7
  max_age: 30      # 天
  level: "debug"    # debug, info, warn, error

# Snowflake配置
snowflake:
  machine_id: 1  # 机器ID (0-1023)，每台机器唯一
